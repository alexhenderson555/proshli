# Reference manifest for `proshli-api-staging` Serverless Container.
# Format is internal documentation — `yc-sls-container-deploy` does not
# read this file. See `ops/deploy/README.md` for how secrets translate
# into the `yc serverless container update` invocation that pins these
# values on the container before the workflow flips revisions.

container: proshli-api-staging
image: cr.yandex/${YC_REGISTRY_ID}/proshli-api  # tag flipped per revision
resources:
  cores: 1
  memory: 512MB
  execution_timeout: 30s
  concurrency: 4
service_account_id: ${YC_DEPLOY_SA_ID}
environment:
  APP_ENV: staging
  DATABASE_URL: ${YC_PG_DSN}
  REDIS_URL: ${YC_REDIS_URL}
  CELERY_BROKER_URL: ${YC_REDIS_URL}/1
  CELERY_RESULT_BACKEND: ${YC_REDIS_URL}/2
  JWT_SECRET: ${JWT_SECRET}
  BOT_SERVICE_KEY: ${BOT_SERVICE_KEY}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
  YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
  SENTRY_DSN: ${SENTRY_DSN_API}
  CORS_ALLOWED_ORIGINS: https://staging.proshli.ru
  TRUSTED_PROXIES: ${YC_GATEWAY_CIDR}  # only honour XFF from the gateway
