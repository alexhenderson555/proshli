# Local dev stack: `docker compose up` brings the full system up on
# localhost. Healthchecks gate the dependency edges so the api/worker
# don't start before Postgres+Redis are actually accepting connections.
#
# Image names use the `proshli-*` prefix so they don't collide with whatever
# else you have running locally.

name: proshli

services:
  pg:
    image: pgvector/pgvector:pg16
    container_name: proshli-pg
    environment:
      POSTGRES_USER: proshli
      POSTGRES_PASSWORD: proshli
      POSTGRES_DB: proshli
    volumes:
      - proshli-pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proshli -d proshli"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: proshli-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Keyword search experiment (Sprint 1 plan §docker setup).
  # The API doesn't index against Meili yet — pgvector covers semantic
  # ranking — but the local container lets us prototype the keyword
  # surface without touching production code paths.
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: proshli-meili
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-proshli-dev-master-key}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - proshli-meili-data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
    container_name: proshli-api
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://proshli:proshli@pg:5432/proshli
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-please}
      BOT_SERVICE_KEY: ${BOT_SERVICE_KEY:-change-me-bot-service-key}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: ./apps/workers/Dockerfile
    container_name: proshli-worker
    command: ["celery", "-A", "workers.celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://proshli:proshli@pg:5432/proshli
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-please}
      BOT_SERVICE_KEY: ${BOT_SERVICE_KEY:-change-me-bot-service-key}
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: ./apps/workers/Dockerfile
    container_name: proshli-beat
    command: ["celery", "-A", "workers.celery_app", "beat", "--loglevel=INFO"]
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://proshli:proshli@pg:5432/proshli
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-please}
      BOT_SERVICE_KEY: ${BOT_SERVICE_KEY:-change-me-bot-service-key}
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: proshli-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  proshli-pg-data:
  proshli-meili-data:
