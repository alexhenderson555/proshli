version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: jobskout-postgres
    environment:
      POSTGRES_DB: jobskout
      POSTGRES_USER: jobskout
      POSTGRES_PASSWORD: jobskout
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
