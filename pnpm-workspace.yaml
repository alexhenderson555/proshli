packages:
  - "apps/*"
  - "packages/*"

# pnpm 11 requires explicit allowlisting of packages whose
# postinstall scripts may run. Without this, `pnpm install --frozen-lockfile`
# errors with ERR_PNPM_IGNORED_BUILDS in CI.
onlyBuiltDependencies:
  - sharp
  - unrs-resolver
  - esbuild
  - "@tailwindcss/oxide"
  - "@swc/core"
  - "@parcel/watcher"
