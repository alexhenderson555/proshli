version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: jobskout-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobskout}
      POSTGRES_USER: ${POSTGRES_USER:-jobskout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobskout}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobskout} -d ${POSTGRES_DB:-jobskout}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: jobskout-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-jobskout}:${POSTGRES_PASSWORD:-jobskout}@postgres:5432/${POSTGRES_DB:-jobskout}
      AUTO_CREATE_SCHEMA: "false"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: jobskout-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-jobskout}:${POSTGRES_PASSWORD:-jobskout}@postgres:5432/${POSTGRES_DB:-jobskout}
      AUTO_CREATE_SCHEMA: "false"
    command:
      [
        "python",
        "backend/scripts/worker_loop.py",
        "--frequency",
        "daily",
        "--interval-seconds",
        "300",
        "--iterations",
        "999999",
      ]

volumes:
  pgdata:
