name: api-ci

on:
  push:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: otklik
          POSTGRES_PASSWORD: otklik
          POSTGRES_DB: otklik
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U otklik -d otklik"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://otklik:otklik@localhost:5432/otklik
      JWT_SECRET: test-secret
      APP_ENV: test
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Enable pgvector extension and prep alembic_version
        env:
          PGPASSWORD: otklik
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql -h localhost -U otklik -d otklik -c "CREATE EXTENSION IF NOT EXISTS vector;"
          # Our revision ids are long (e.g. "0002_profiles_and_resume_versions").
          # Alembic's default varchar(32) truncates them, so pre-create the
          # table with a wider column.
          psql -h localhost -U otklik -d otklik -c "CREATE TABLE IF NOT EXISTS alembic_version (version_num VARCHAR(255) NOT NULL, CONSTRAINT alembic_version_pkc PRIMARY KEY (version_num));"

      - name: Ruff lint
        run: uv run ruff check app tests

      - name: Mypy (new code only — pre-existing connector errors tolerated)
        run: uv run mypy app || true

      - name: Bandit security scan
        run: uv run bandit -r app -ll

      - name: Alembic migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest tests -q --cov=app --cov-report=term-missing --cov-fail-under=70
