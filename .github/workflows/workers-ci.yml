name: workers-ci

on:
  push:
    paths:
      - "apps/workers/**"
      - "apps/api/app/**"
      - ".github/workflows/workers-ci.yml"
  pull_request:
    paths:
      - "apps/workers/**"
      - "apps/api/app/**"
      - ".github/workflows/workers-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Wave 2 introduced ``test_billing_renewal.py`` which exercises the
    # renewal task end-to-end against the real DB (shared with the api
    # service in compose). Workers don't ship alembic of their own — the
    # test uses ``Base.metadata.create_all`` — but it still needs the
    # pgvector extension because ``app.models`` declares a ``Vector``
    # column for semantic search.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: proshli
          POSTGRES_PASSWORD: proshli
          POSTGRES_DB: proshli
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U proshli -d proshli"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://proshli:proshli@localhost:5432/proshli
      JWT_SECRET: test-secret
      APP_ENV: test
    defaults:
      run:
        working-directory: apps/workers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Enable pgvector extension
        env:
          PGPASSWORD: proshli
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql -h localhost -U proshli -d proshli -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Ruff lint
        run: uv run ruff check workers tests

      - name: Mypy
        run: uv run mypy workers

      - name: Smoke tests
        # ``test_smoke`` just inspects the Celery app object (no Redis
        # connection). ``test_billing_renewal`` hits the postgres
        # service declared above for real state transitions.
        run: uv run pytest -q
