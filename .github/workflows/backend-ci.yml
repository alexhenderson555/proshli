name: backend-ci

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Ruff lint
        run: |
          ruff check backend

      - name: Bandit security scan
        run: |
          bandit -c .bandit -r backend/app

      - name: Run tests
        run: |
          PYTHONPATH=backend pytest backend/tests -q --cov=backend/app --cov-report=term-missing --cov-fail-under=70
